<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Permit Pre-Flight Validator</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2.5rem; color: #ffd700; margin-bottom: 10px; }
    .header p { color: #a0a0a0; font-size: 1.1rem; }
    .upload-zone {
      border: 3px dashed #4a9eff;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      background: rgba(74, 158, 255, 0.05);
      transition: all 0.3s ease;
      cursor: pointer;
      margin-bottom: 30px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.08);
      transform: scale(1.01);
    }
    .upload-zone svg { width: 64px; height: 64px; fill: #4a9eff; margin-bottom: 20px; }
    .upload-zone h3 { font-size: 1.3rem; margin-bottom: 10px; }
    .upload-zone p { color: #888; }
    .upload-zone input { display: none; }
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 250px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #b0b0b0;
      font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1e1e3f;
      color: #e0e0e0;
      font-size: 1rem;
    }
    .btn {
      padding: 14px 40px;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .results { margin-top: 40px; }
    .status-card {
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
    }
    .status-pass { background: linear-gradient(135deg, #1e4620, #2e7d32); }
    .status-fail { background: linear-gradient(135deg, #5c1818, #c62828); }
    .status-review { background: linear-gradient(135deg, #5c4b18, #f9a825); }
    .status-card h2 { font-size: 2rem; margin-bottom: 10px; }
    .status-card .pass-rate { font-size: 4rem; font-weight: 700; margin: 20px 0; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .metric-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .metric-card h4 { color: #888; font-size: 0.9rem; margin-bottom: 8px; }
    .metric-card .value { font-size: 1.8rem; font-weight: 700; color: #ffd700; }
    .violations { display: grid; gap: 15px; }
    .violation {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid;
    }
    .violation.critical { border-color: #ff4444; }
    .violation.major { border-color: #ffaa00; }
    .violation.minor { border-color: #4a9eff; }
    .violation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .violation-header h4 { font-size: 1.1rem; }
    .severity-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .severity-critical { background: #ff4444; color: white; }
    .severity-major { background: #ffaa00; color: #1a1a2e; }
    .severity-minor { background: #4a9eff; color: white; }
    .violation p { color: #b0b0b0; margin-bottom: 8px; }
    .violation .reference { color: #4a9eff; font-size: 0.85rem; }
    .violation .fix { color: #66bb6a; font-size: 0.9rem; margin-top: 8px; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #ffd700;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .footer { text-align: center; margin-top: 60px; color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
